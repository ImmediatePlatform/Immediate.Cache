name: Build

on: 
  workflow_dispatch:
  push:
    branches: 
      - 'master'
    paths-ignore:
      - '**/readme.md'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-quality: 'preview'
        dotnet-version: |
          11.0.x

    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build -c Release --no-restore
    - name: Test
      run: dotnet test -c Release --no-build -- --coverage --coverage-output-format cobertura --coverage-output coverage.cobertura.xml

    - name: Coveralls
      uses: coverallsapp/github-action@v2
      with:
        files: 
          tests\Immediate.Cache.FunctionalTests\bin\Release\net8.0\TestResults\coverage.cobertura.xml
          tests\Immediate.Cache.FunctionalTests\bin\Release\net9.0\TestResults\coverage.cobertura.xml
          tests\Immediate.Cache.FunctionalTests\bin\Release\net10.0\TestResults\coverage.cobertura.xml
          tests\Immediate.Cache.FunctionalTests\bin\Release\net11.0\TestResults\coverage.cobertura.xml
          tests\Immediate.Cache.Tests\bin\Release\net8.0\TestResults\coverage.cobertura.xml
          tests\Immediate.Cache.Tests\bin\Release\net9.0\TestResults\coverage.cobertura.xml
          tests\Immediate.Cache.Tests\bin\Release\net10.0\TestResults\coverage.cobertura.xml
          tests\Immediate.Cache.Tests\bin\Release\net11.0\TestResults\coverage.cobertura.xml
